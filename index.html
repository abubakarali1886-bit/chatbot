<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYNOX42 · Chemistry AI</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        /* ---------- MODERN CSS RESET & VARIABLES ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
            
            /* Light mode - Clean & professional */
            --bg-primary: #f9fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f2f4f8;
            --border-light: #e5e9f0;
            --border-focus: #b2c9e8;
            --text-primary: #1a2639;
            --text-secondary: #4a5568;
            --text-tertiary: #718096;
            --accent-primary: #2563eb;
            --accent-secondary: #1e4fd9;
            --accent-soft: #dbeafe;
            --user-bubble: #2563eb;
            --user-bubble-text: #ffffff;
            --bot-bubble: #f2f4f8;
            --bot-bubble-text: #1a2639;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.03), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.03), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-xl: 0 20px 30px -10px rgba(0,0,0,0.05);
            --gradient-sidebar: linear-gradient(135deg, #fbfdff 0%, #ffffff 100%);
        }

        [data-theme="dark"] {
            --bg-primary: #0b1120;
            --bg-secondary: #151f31;
            --bg-tertiary: #1e2a3a;
            --border-light: #2a3748;
            --border-focus: #3b4e6b;
            --text-primary: #edf2f7;
            --text-secondary: #cbd5e0;
            --text-tertiary: #9aa9b9;
            --accent-primary: #3b82f6;
            --accent-secondary: #2563eb;
            --accent-soft: #1e3a5f;
            --user-bubble: #3b82f6;
            --user-bubble-text: #ffffff;
            --bot-bubble: #1e2a3a;
            --bot-bubble-text: #edf2f7;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.5);
            --shadow-xl: 0 20px 30px -10px rgba(0,0,0,0.6);
            --gradient-sidebar: linear-gradient(135deg, #151f31 0%, #1a2538 100%);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.15s ease, color 0.15s ease;
            line-height: 1.5;
            font-size: 14px;
        }

        /* ---------- MAIN LAYOUT ---------- */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ---------- SIDEBAR (CHAT HISTORY) ---------- */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            transition: background 0.15s ease;
            backdrop-filter: blur(4px);
        }

        .sidebar-header {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: var(--shadow-md);
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            margin: 16px 20px;
            padding: 12px 16px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-focus);
        }

        .new-chat-btn:hover {
            background: var(--accent-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .new-chat-btn i {
            font-size: 1rem;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 12px 20px;
        }

        .chat-history-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 8px 12px 8px;
            color: var(--text-tertiary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            position: relative;
            background: var(--bg-secondary);
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-light);
        }

        .chat-item.active {
            background: var(--accent-soft);
            border-color: var(--accent-primary);
        }

        .chat-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 0.9rem;
        }

        .chat-item-content {
            flex: 1;
            min-width: 0;
        }

        .chat-item-title {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .chat-item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .chat-item-time {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .chat-item-delete {
            opacity: 0;
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.15s;
            font-size: 0.8rem;
        }

        .chat-item:hover .chat-item-delete {
            opacity: 1;
        }

        .chat-item-delete:hover {
            background: var(--bg-tertiary);
            color: #ef4444;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-light);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-radius: 40px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .theme-toggle button {
            width: 36px;
            height: 36px;
            border-radius: 30px;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            border: 1px solid var(--border-light);
        }

        .theme-toggle button:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        /* ---------- MAIN CHAT AREA ---------- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
        }

        .chat-header-info h2 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .chat-header-info h3 {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-info h3 i {
            font-size: 0.7rem;
            color: var(--accent-primary);
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        .chat-actions button {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-actions button:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            scroll-behavior: smooth;
        }

        .messages-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--accent-primary);
            flex-shrink: 0;
            border: 1px solid var(--border-light);
        }

        .user .message-avatar {
            background: var(--accent-primary);
            color: white;
            border: none;
        }

        .message-content {
            flex: 1;
            max-width: calc(100% - 52px);
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: break-word;
        }

        .user .message-bubble {
            background: var(--user-bubble);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 4px;
        }

        .bot .message-bubble {
            background: var(--bot-bubble);
            color: var(--bot-bubble-text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-light);
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            padding: 0 8px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .user .message-meta {
            justify-content: flex-end;
        }

        .message-lang {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 20px;
            background: var(--bot-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-light);
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            padding: 20px 28px 28px 28px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            background: var(--bg-primary);
            border: 2px solid var(--border-light);
            border-radius: 40px;
            padding: 4px 4px 4px 20px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-tertiary);
        }

        .input-wrapper button {
            width: 48px;
            height: 48px;
            border-radius: 40px;
            border: none;
            background: var(--accent-primary);
            color: white;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .input-wrapper button:hover:not(:disabled) {
            background: var(--accent-secondary);
            transform: scale(1.02);
        }

        .input-wrapper button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-footer {
            max-width: 900px;
            margin: 10px auto 0;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .input-footer i {
            color: var(--accent-primary);
        }

        /* Chemistry formatting */
        sub { font-size: 0.7em; vertical-align: sub; }
        .katex { font-size: 1.05em; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--border-focus); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 0.9rem;
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body data-theme="light">
    <div class="app">
        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-flask"></i>
                </div>
                <h1>KRYNOX42</h1>
            </div>

            <button class="new-chat-btn" onclick="createNewChat()">
                <i class="fas fa-plus"></i>
                <span>New chat</span>
            </button>

            <div class="chat-history">
                <div class="chat-history-title">
                    <span><i class="far fa-clock"></i> Recent chats</span>
                    <span id="chatCount"></span>
                </div>
                <div class="chat-history-list" id="chatHistoryList"></div>
            </div>

            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <span><i class="fas fa-moon"></i> Dark mode</span>
                    <button onclick="toggleTheme()" id="themeToggleBtn">
                        <i class="fas fa-sun"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- ========== MAIN CHAT ========== -->
        <main class="main">
            <div class="chat-header">
                <div class="chat-header-info">
                    <h2>KRYNOX42 · Chemistry AI</h2>
                    <h3>
                        <i class="fas fa-circle" style="font-size: 0.5rem;"></i>
                        <span id="currentChatTitle">Select a chat</span>
                    </h3>
                </div>
                <div class="chat-actions">
                    <button onclick="copyAllChat()" title="Copy conversation">
                        <i class="far fa-copy"></i> Copy
                    </button>
                    <button onclick="clearCurrentChat()" title="Clear chat">
                        <i class="far fa-trash-alt"></i> Clear
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="messages-wrapper" id="chatMessages">
                    <!-- Messages go here -->
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="questionInput" 
                           placeholder="Ask about chemistry... (English or Kiswahili)"
                           autocomplete="off"
                           onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div class="input-footer">
                    <span><i class="fas fa-atom"></i> Chemical formulas supported (H₂O, CO₂)</span>
                    <span><i class="fas fa-language"></i> English · Kiswahili</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ---------- CONFIG ----------
        const API_URL = "https://krynox42.abubakarali1886.workers.dev";
        
        // ---------- STATE ----------
        let chats = [];
        let currentChatId = null;
        let isTyping = false;

        // ---------- INITIALIZE ----------
        function loadChats() {
            const saved = localStorage.getItem('krynox42_chats');
            if (saved) {
                try {
                    chats = JSON.parse(saved);
                } catch (e) {
                    chats = [];
                }
            }
            
            if (chats.length === 0) {
                createNewChat();
            } else {
                // Sort by most recent
                chats.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                currentChatId = chats[0].id;
                renderChatHistory();
                loadChatMessages(currentChatId);
                updateCurrentChatTitle();
            }
        }

        // ---------- SAVE ----------
        function saveChats() {
            localStorage.setItem('krynox42_chats', JSON.stringify(chats));
            renderChatHistory();
        }

        // ---------- CREATE NEW CHAT ----------
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New conversation',
                messages: [{
                    type: 'bot',
                    content: `### 👋 Hello! I'm KRYNOX42, your chemistry AI tutor.

I can help you with **chemistry concepts** in both English and Kiswahili.

**How to use me:**
• Ask in **English** → I'll reply in English
• Ask in **Kiswahili** → I'll reply in Kiswahili

**Try asking:**
• "Explain atomic structure"
• "Eleza muundo wa atomi"
• "What is pH?"
• "Ni nini pH?"

What would you like to learn today? 🔬`,
                    timestamp: new Date().toISOString()
                }],
                timestamp: new Date().toISOString()
            };
            
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            loadChatMessages(currentChatId);
            updateCurrentChatTitle();
        }

        // ---------- SWITCH CHAT ----------
        function switchChat(chatId) {
            currentChatId = chatId;
            loadChatMessages(chatId);
            renderChatHistory();
            updateCurrentChatTitle();
        }

        // ---------- DELETE CHAT ----------
        function deleteChat(chatId, event) {
            event.stopPropagation();
            
            if (chats.length === 1) {
                // Clear instead of delete
                const chat = chats.find(c => c.id === chatId);
                if (chat) {
                    chat.messages = [{
                        type: 'bot',
                        content: `### 👋 Hello! I'm KRYNOX42, your chemistry AI tutor.

I can help you with **chemistry concepts** in both English and Kiswahili.

**How to use me:**
• Ask in **English** → I'll reply in English
• Ask in **Kiswahili** → I'll reply in Kiswahili

What would you like to learn today? 🔬`,
                        timestamp: new Date().toISOString()
                    }];
                    chat.title = 'New conversation';
                    chat.timestamp = new Date().toISOString();
                    saveChats();
                    loadChatMessages(chatId);
                }
            } else {
                const index = chats.findIndex(c => c.id === chatId);
                if (index !== -1) {
                    chats.splice(index, 1);
                    if (currentChatId === chatId) {
                        currentChatId = chats[0].id;
                        loadChatMessages(currentChatId);
                    }
                    saveChats();
                }
            }
            updateCurrentChatTitle();
        }

        // ---------- CLEAR CURRENT CHAT ----------
        function clearCurrentChat() {
            if (!currentChatId) return;
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages = [{
                    type: 'bot',
                    content: `### 👋 Hello! I'm KRYNOX42, your chemistry AI tutor.

I can help you with **chemistry concepts** in both English and Kiswahili.

**How to use me:**
• Ask in **English** → I'll reply in English
• Ask in **Kiswahili** → I'll reply in Kiswahili

What would you like to learn today? 🔬`,
                    timestamp: new Date().toISOString()
                }];
                chat.timestamp = new Date().toISOString();
                saveChats();
                loadChatMessages(currentChatId);
            }
        }

        // ---------- RENDER CHAT HISTORY ----------
        function renderChatHistory() {
            const list = document.getElementById('chatHistoryList');
            const countSpan = document.getElementById('chatCount');
            
            list.innerHTML = '';
            if (chats.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-tertiary);">No chats yet</div>';
                return;
            }
            
            countSpan.textContent = chats.length;
            
            chats.slice(0, 20).forEach(chat => {
                const lastMsg = chat.messages[chat.messages.length - 1];
                const preview = lastMsg ? 
                    (lastMsg.type === 'user' ? 'You: ' : '') + 
                    (lastMsg.content.substring(0, 40) + (lastMsg.content.length > 40 ? '...' : ''))
                    : '';
                
                const date = new Date(chat.timestamp);
                const timeStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => switchChat(chat.id);
                
                item.innerHTML = `
                    <div class="chat-item-icon">
                        <i class="fas fa-${chat.messages.length > 1 ? 'comment' : 'plus'}"></i>
                    </div>
                    <div class="chat-item-content">
                        <div class="chat-item-title">${chat.title}</div>
                        <div class="chat-item-meta">
                            <span class="chat-item-time">
                                <i class="far fa-calendar"></i> ${timeStr}
                            </span>
                            <span>·</span>
                            <span>${chat.messages.length} msgs</span>
                        </div>
                    </div>
                    <button class="chat-item-delete" onclick="deleteChat('${chat.id}', event)">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                list.appendChild(item);
            });
        }

        // ---------- LOAD CHAT MESSAGES ----------
        function loadChatMessages(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            const wrapper = document.getElementById('chatMessages');
            wrapper.innerHTML = '';
            
            chat.messages.forEach(msg => {
                wrapper.appendChild(createMessageElement(msg));
            });
            
            scrollToBottom();
            
            // Render math
            if (window.renderMathInElement) {
                renderMathInElement(wrapper, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        // ---------- CREATE MESSAGE ELEMENT ----------
        function createMessageElement(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.type}`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            // Detect language for tag
            let langTag = '';
            if (msg.type === 'bot') {
                const isSw = /[áéíóúàâêîôû]|habari|asante|tafadhali|kiswahili|ni nini|eleza|maana|kemia|atomu|molekuli/i.test(msg.content);
                langTag = `<span class="message-lang">${isSw ? 'SW' : 'EN'}</span>`;
            }
            
            // Format content
            let content = msg.content
                .replace(/\b([A-Z][a-z]?\d+)/g, (match) => {
                    return match.replace(/\d+/g, (num) => `<sub>${num}</sub>`);
                })
                .replace(/### (.*?)(?:\n|$)/g, '<h3 style="font-size:1.1rem; margin-bottom:8px;">$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
            
            div.innerHTML = `
                <div class="message-avatar">
                    <i class="fas ${msg.type === 'user' ? 'fa-user' : 'fa-flask'}"></i>
                </div>
                <div class="message-content">
                    <div class="message-bubble">
                        ${content}
                    </div>
                    <div class="message-meta">
                        <span>${time}</span>
                        ${langTag}
                    </div>
                </div>
            `;
            
            return div;
        }

        // ---------- SEND MESSAGE ----------
        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question || isTyping || !currentChatId) return;
            
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            // Add user message
            const userMsg = {
                type: 'user',
                content: question,
                timestamp: new Date().toISOString()
            };
            chat.messages.push(userMsg);
            
            // Update title if first message
            if (chat.messages.filter(m => m.type === 'user').length === 1) {
                chat.title = question.substring(0, 40) + (question.length > 40 ? '...' : '');
            }
            
            chat.timestamp = new Date().toISOString();
            saveChats();
            loadChatMessages(currentChatId);
            updateCurrentChatTitle();
            
            input.value = '';
            
            // Disable input
            document.getElementById('sendBtn').disabled = true;
            isTyping = true;
            showTypingIndicator();
            
            try {
                // Detect language
                const isSwahili = /[áéíóúàâêîôû]|habari|asante|tafadhali|ni nini|eleza|maana|kiswahili|je |vipi|kemia|atomu|molekuli/i.test(question);
                
                const langInstruction = isSwahili 
                    ? "IMPORTANT: The user asked in Swahili. You MUST respond in SWAHILI (Kiswahili). Use proper chemistry terms."
                    : "IMPORTANT: Respond in ENGLISH. Use proper chemistry terminology.";
                
                const prompt = `[System] You are KRYNOX42, an expert chemistry professor. ${langInstruction}

Question: ${question}

Answer:`;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: prompt })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                removeTypingIndicator();
                
                const botMsg = {
                    type: 'bot',
                    content: data.answer || 'Sorry, I could not find an answer.',
                    timestamp: new Date().toISOString()
                };
                chat.messages.push(botMsg);
                chat.timestamp = new Date().toISOString();
                saveChats();
                loadChatMessages(currentChatId);
                
            } catch (error) {
                removeTypingIndicator();
                const errorMsg = {
                    type: 'bot',
                    content: `❌ **Connection error**: ${error.message}`,
                    timestamp: new Date().toISOString()
                };
                chat.messages.push(errorMsg);
                saveChats();
                loadChatMessages(currentChatId);
            } finally {
                document.getElementById('sendBtn').disabled = false;
                isTyping = false;
            }
        }

        // ---------- TYPING INDICATOR ----------
        function showTypingIndicator() {
            const wrapper = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="fas fa-flask"></i>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            wrapper.appendChild(typingDiv);
            scrollToBottom();
        }
        
        function removeTypingIndicator() {
            document.getElementById('typingIndicator')?.remove();
        }

        // ---------- COPY ALL ----------
        function copyAllChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            let text = '';
            chat.messages.forEach(m => {
                text += `${m.type === 'user' ? '👤 You' : '🧪 KRYNOX42'}: ${m.content}\n\n`;
            });
            navigator.clipboard.writeText(text);
            showToast('Conversation copied');
        }

        // ---------- TOAST ----------
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed;
                top: 24px;
                right: 24px;
                background: var(--accent-primary);
                color: white;
                padding: 12px 24px;
                border-radius: 40px;
                font-size: 0.9rem;
                font-weight: 500;
                box-shadow: var(--shadow-lg);
                z-index: 9999;
                animation: slideIn 0.2s;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ---------- UTILITIES ----------
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function updateCurrentChatTitle() {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                document.getElementById('currentChatTitle').textContent = chat.title;
            }
        }

        // ---------- THEME ----------
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme') || 'light';
            const newTheme = current === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('krynox42_theme', newTheme);
            
            const btn = document.getElementById('themeToggleBtn');
            btn.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        
        function loadTheme() {
            const saved = localStorage.getItem('krynox42_theme');
            if (saved) {
                document.body.setAttribute('data-theme', saved);
                const btn = document.getElementById('themeToggleBtn');
                btn.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
        }

        // ---------- INIT ----------
        window.addEventListener('load', () => {
            loadTheme();
            loadChats();
            
            // Add animation style
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        });

        // Expose functions globally
        window.createNewChat = createNewChat;
        window.switchChat = switchChat;
        window.deleteChat = deleteChat;
        window.clearCurrentChat = clearCurrentChat;
        window.copyAllChat = copyAllChat;
        window.toggleTheme = toggleTheme;
        window.sendMessage = sendMessage;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</body>
</html>
